services:
  db:
    image: postgres:16-alpine
    container_name: feedbackflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: feedbackflow
      POSTGRES_PASSWORD: feedbackflow
      POSTGRES_DB: feedbackflow
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedbackflow"]
      interval: 5s
      timeout: 5s
      retries: 10
