version: 1
# AWS Amplify build settings for the FeedbackFlow AI Next.js frontend.
# Amplify reads this file from the repo root automatically.
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npx prisma generate
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
